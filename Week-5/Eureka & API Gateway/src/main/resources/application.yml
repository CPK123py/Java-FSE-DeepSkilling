spring:
  application:
    name: eureka-api-gateway
  cloud:
    gateway:
      routes:
        - id: accounts-service
          uri: http://localhost:8081
          predicates:
            - Path=/accounts/**
        - id: loans-service
          uri: http://localhost:8082
          predicates:
            - Path=/loans/**

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    enable-self-preservation: false
